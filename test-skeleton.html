<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骨架屏测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
        }
        h1 {
            color: #C41D1D;
        }
        .test-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        button {
            padding: 12px 24px;
            background: #C41D1D;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #a01818;
        }
        .demo-area {
            margin-top: 30px;
            border: 2px dashed #444;
            padding: 20px;
            border-radius: 8px;
            min-height: 300px;
            position: relative;
        }
        .skeleton-demo {
            width: 100%;
            height: 200px;
            background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 37%, #2a2a2a 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s ease infinite;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #333;
            border-radius: 6px;
            font-family: monospace;
        }
        .success {
            color: #4CAF50;
        }
        .error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>骨架屏功能测试</h1>
        <p>此页面用于验证骨架屏实现的核心功能：</p>
        <ul>
            <li>1. 骨架屏显示/隐藏控制</li>
            <li>2. 流光动画效果</li>
            <li>3. 字体加载检测</li>
            <li>4. 资源预加载</li>
        </ul>
        
        <div class="test-buttons">
            <button onclick="simulateLoading()">模拟加载过程</button>
            <button onclick="checkFontLoading()">测试字体加载</button>
            <button onclick="testAnimation()">测试动画效果</button>
        </div>
        
        <div class="demo-area">
            <h3>骨架屏演示</h3>
            <div class="skeleton-demo" id="demoSkeleton"></div>
            <div id="demoContent" style="display: none;">
                <h3>加载完成的内容</h3>
                <p>这是模拟加载完成后显示的实际内容。</p>
            </div>
        </div>
        
        <div class="status" id="status">
            状态: 等待测试...
        </div>
    </div>
    
    <script>
        function simulateLoading() {
            const status = document.getElementById('status');
            const skeleton = document.getElementById('demoSkeleton');
            const content = document.getElementById('demoContent');
            
            status.innerHTML = '状态: <span class="success">开始模拟加载...</span>';
            skeleton.style.display = 'block';
            content.style.display = 'none';
            
            // 模拟3秒加载时间
            setTimeout(() => {
                skeleton.style.display = 'none';
                content.style.display = 'block';
                status.innerHTML = '状态: <span class="success">✓ 加载完成，骨架屏隐藏，内容显示</span>';
            }, 3000);
        }
        
        function checkFontLoading() {
            const status = document.getElementById('status');
            
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(() => {
                    status.innerHTML = '状态: <span class="success">✓ 字体加载完成 (document.fonts.ready 可用)</span>';
                });
            } else {
                status.innerHTML = '状态: <span class="error">✗ document.fonts.ready 不可用</span>';
            }
        }
        
        function testAnimation() {
            const skeleton = document.getElementById('demoSkeleton');
            const status = document.getElementById('status');
            
            // 重置动画
            skeleton.style.animation = 'none';
            setTimeout(() => {
                skeleton.style.animation = 'shimmer 1.4s ease infinite';
                status.innerHTML = '状态: <span class="success">✓ 流光动画运行正常</span>';
            }, 10);
        }
        
        // 页面加载时自动测试
        window.addEventListener('load', () => {
            document.getElementById('status').innerHTML = 
                '状态: <span class="success">页面加载完成，可以开始测试</span>';
        });
    </script>
</body>
</html>
